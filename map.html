function latLngToSvg(lat, lng) {
  return { x: ((lng + 180) / 360) * 1000, y: ((90 - lat) / 180) * 500 };
}

function svgToLatLng(clientX, clientY) {
  const svg = document.getElementById('mapSvg');
  const rect = svg.getBoundingClientRect();
  const svgX = ((clientX - rect.left) / rect.width) * 1000;
  const svgY = ((clientY - rect.top) / rect.height) * 500;
  return {
    lat: parseFloat((90 - (svgY / 500) * 180).toFixed(4)),
    lng: parseFloat(((svgX / 1000) * 360 - 180).toFixed(4))
  };
}

function timeRemaining(expiresAt) {
  const diff = new Date(expiresAt) - new Date();
  if (diff <= 0) return 'Expired';
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  if (days > 0) return `${days}d ${hours}h remaining`;
  return `${hours}h remaining`;
}

  return Array.from({length: 5}, () => chars[Math.floor(Math.random() * chars.length)]).join('');

async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', ...options.headers },
    ...options
  });
  const text = await res.text();
  if (!res.ok) throw new Error(`Supabase ${res.status}: ${text}`);
  return text ? JSON.parse(text) : [];
}

    l.setAttribute('x1',0); l.setAttribute('y1', ((90-lat)/180)*500);
    l.setAttribute('x2',1000); l.setAttribute('y2', ((90-lat)/180)*500);
    l.setAttribute('stroke','rgba(200,150,62,0.05)'); l.setAttribute('stroke-width','0.5');
    svg.appendChild(l);
  }
  for (let lng = -180; lng <= 180; lng += 30) {
    const x = ((lng + 180) / 360) * 1000;
    const l = document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x); l.setAttribute('y1',0);
    l.setAttribute('x2',x); l.setAttribute('y2',500);
    l.setAttribute('stroke','rgba(200,150,62,0.05)'); l.setAttribute('stroke-width','0.5');
    svg.appendChild(l);
  }

  // Load Natural Earth world map data from CDN — 8 second timeout
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 8000);
    const topoResponse = await fetch(
      'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json',
      { signal: controller.signal }
    );
    clearTimeout(timer);
    const world = await topoResponse.json();

    // Use topojson to get country features
    const countries = topojson.feature(world, world.objects.countries);
    const projection = d3.geoEquirectangular()
      .scale(159.15)
      .translate([500, 250]);
    const path = d3.geoPath().projection(projection);

    // Create a group for all countries
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('id', 'countriesGroup');

    countries.features.forEach(feature => {
      const p = document.createElementNS('http://www.w3.org/2000/svg','path');
      const d = path(feature);
      if (!d) return;
      p.setAttribute('d', d);
      p.setAttribute('fill','rgba(200,150,62,0.08)');
      p.setAttribute('stroke','rgba(200,150,62,0.28)');
      p.setAttribute('stroke-width','0.6');
      p.setAttribute('stroke-linejoin','round');
      p.style.transition = 'fill 0.2s';
      p.addEventListener('mouseenter', () => p.setAttribute('fill','rgba(200,150,62,0.18)'));
      p.addEventListener('mouseleave', () => p.setAttribute('fill','rgba(200,150,62,0.08)'));
      g.appendChild(p);
    });

    svg.appendChild(g);
  } catch(e) {
    console.error('Map load error:', e);
    // Fallback - ocean background only
  }

  svg.addEventListener('click', handleMapClick);
  svg.addEventListener('mousemove', e => {
    const { lat, lng } = svgToLatLng(e.clientX, e.clientY);
    const tt = document.getElementById('mapTooltip');
    tt.style.display = 'block';
    tt.style.left = (e.clientX + 14) + 'px';
    tt.style.top = (e.clientY - 30) + 'px';
    tt.textContent = `${approxLocation(lat, lng)} · ${lat.toFixed(1)}°, ${lng.toFixed(1)}°`;
  });
  svg.addEventListener('mouseleave', () => { document.getElementById('mapTooltip').style.display = 'none'; });
}

function isMobile() { return window.innerWidth <= 600; }

function positionPopup(popup, cx, cy, wrap) {
  wrap.appendChild(popup);
  document.getElementById('popupBackdrop').classList.add('visible');

  if (isMobile()) {
    // On mobile it is a bottom sheet - CSS handles positioning
    return;
  }

  // Desktop positioning
  const wRect = wrap.getBoundingClientRect();
  const pw = popup.offsetWidth || 300;
  const ph = popup.offsetHeight || 400;
  let left = cx - wRect.left - pw / 2;
  let top = cy - wRect.top - ph - 16;
  if (left < 8) left = 8;
  if (left + pw > wRect.width - 8) left = wRect.width - pw - 8;
  if (top < 8) top = cy - wRect.top + 20;
  if (top + ph > wRect.height - 8) top = wRect.height - ph - 8;
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
}

function closePopup() {
  const el = document.getElementById('activePopup');
  if (el) el.remove();
  document.getElementById('popupBackdrop').classList.remove('visible');
  selectedIntent = '';
}

function selectIntent(btn, val) {
  document.querySelectorAll('.intent-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedIntent = val;
  const inp = document.getElementById('intentInput');
  if (inp) inp.value = val;
}

async function proceedToPayment() {
  const btn = document.getElementById('popupCta');
  if (!btn) return;

  const country = (document.getElementById('countryInput')?.value || '').trim();
  const hometown = (document.getElementById('hometownInput')?.value || '').trim();
  const nickname = (document.getElementById('nicknameInput')?.value || '').trim();
  const intention = (document.getElementById('intentInput')?.value || selectedIntent || 'Peace').trim();

  if (!country) {
    document.getElementById('countryInput').style.borderColor = 'var(--ember)';
    document.getElementById('countryInput').focus();
    return;
  }
  if (!hometown) {
    document.getElementById('hometownInput').style.borderColor = 'var(--ember)';
    document.getElementById('hometownInput').focus();
    return;
  }

  // Use country centre coordinates for accuracy
  // Add small random offset so multiple candles from same country don't stack exactly
  const coords = COUNTRY_COORDS[country] || [selectedLat, selectedLng];
  const jitter = () => (Math.random() - 0.5) * 2;
  const finalLat = coords[0] + jitter();
  const finalLng = coords[1] + jitter();

  btn.disabled = true; btn.textContent = 'Saving...';

  try {
    await insertCandle({
      code: generatedCode,
      nickname: nickname || null,
      latitude: parseFloat(finalLat.toFixed(4)),
      longitude: parseFloat(finalLng.toFixed(4)),
      location_name: `${hometown}, ${country}`,
      intention,
      payment_confirmed: false
    });

    // Direct redirect instead of window.open - fixes Safari popup blocking on iPhone
    const stripeUrl = `${STRIPE_LINK}?client_reference_id=${generatedCode}`;
    closePopup();

    // Show brief confirmation before redirecting
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(10,8,6,0.95);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;';
    overlay.innerHTML = `
      <div style="font-size:52px;margin-bottom:20px;">🕯</div>
      <div style="font-family:Georgia,serif;font-size:28px;color:#FDFAF5;margin-bottom:8px;">Your flame code</div>
      <div style="font-family:monospace;font-size:36px;color:#C8963E;letter-spacing:0.3em;font-weight:700;margin-bottom:16px;">${generatedCode}</div>
      <div style="font-size:14px;color:#9A8570;margin-bottom:32px;line-height:1.6;">Save this code. Your flame will appear<br>on the map after payment completes.</div>
      <div style="font-size:13px;color:#9A8570;margin-bottom:8px;">Taking you to secure payment...</div>
      <div style="width:200px;height:2px;background:rgba(200,150,62,0.2);border-radius:1px;overflow:hidden;margin:0 auto;">
        <div style="height:100%;background:#C8963E;border-radius:1px;animation:loadBar 2s ease forwards;"></div>
      </div>
      <style>@keyframes loadBar{from{width:0}to{width:100%}}</style>`;
    document.body.appendChild(overlay);

    // Redirect after 2 seconds so user sees their code
    setTimeout(() => {
      window.location.href = stripeUrl;
    }, 2000);

  } catch(err) {
    console.error('Payment flow error:', err);
    btn.disabled = false;
    btn.textContent = '🕯 Light My Flame — £0.99';
    alert('Could not save your candle. Error: ' + err.message + '\n\nPlease screenshot this and report it.');
  }
}

// As candle count grows dots shrink to keep map readable
function getDotSize(totalCandles) {
  if (totalCandles < 100) return { dot: 4, glow: 8 };
  if (totalCandles < 500) return { dot: 3.5, glow: 7 };
  if (totalCandles < 1000) return { dot: 3, glow: 6 };
  if (totalCandles < 5000) return { dot: 2.5, glow: 5 };
  if (totalCandles < 10000) return { dot: 2, glow: 4 };
  return { dot: 1.5, glow: 3 };
}

function renderCandles(list) {
  const svg = document.getElementById('mapSvg');
  svg.querySelectorAll('.candle-dot').forEach(el => el.remove());
  const sizes = getDotSize(list.length);

  list.forEach(c => {
    const pos = latLngToSvg(c.latitude, c.longitude);
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','candle-dot'); g.style.cursor = 'pointer';

    const glow = document.createElementNS('http://www.w3.org/2000/svg','circle');
    glow.setAttribute('cx', pos.x); glow.setAttribute('cy', pos.y);
    glow.setAttribute('r', sizes.glow);
    glow.setAttribute('fill','rgba(200,150,62,0.25)');
    const anim = document.createElementNS('http://www.w3.org/2000/svg','animate');
    anim.setAttribute('attributeName','r');
    anim.setAttribute('values',`${sizes.glow * 0.7};${sizes.glow * 1.3};${sizes.glow * 0.7}`);
    anim.setAttribute('dur', (2 + Math.random() * 2) + 's'); anim.setAttribute('repeatCount','indefinite');
    glow.appendChild(anim);

    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx', pos.x); dot.setAttribute('cy', pos.y);
    dot.setAttribute('r', sizes.dot);
    dot.setAttribute('fill','#C8963E');

    g.appendChild(glow); g.appendChild(dot);
    g.addEventListener('mouseenter', e => {
      dot.setAttribute('r', sizes.dot * 1.5);
      dot.setAttribute('fill','#E8B86D');
      const tt = document.getElementById('mapTooltip');
      tt.innerHTML = `<strong style="color:var(--gold);letter-spacing:0.1em;">${c.code}</strong>&nbsp;&nbsp;${c.nickname || 'Anonymous'}`;
      tt.style.display = 'block';
      tt.style.left = (e.clientX + 14) + 'px';
      tt.style.top = (e.clientY - 36) + 'px';
    });
    g.addEventListener('mousemove', e => {
      const tt = document.getElementById('mapTooltip');
      tt.style.left = (e.clientX + 14) + 'px';
      tt.style.top = (e.clientY - 36) + 'px';
    });
    g.addEventListener('mouseleave', () => {
      dot.setAttribute('r', sizes.dot);
      dot.setAttribute('fill','#C8963E');
      document.getElementById('mapTooltip').style.display = 'none';
    });
    svg.appendChild(g);
  });
  document.getElementById('liveCount').textContent = list.length.toLocaleString();
}

  const svg = document.getElementById('mapSvg');
  svg.querySelectorAll('.own-candle').forEach(el => el.remove());

  const pos = latLngToSvg(c.latitude, c.longitude);

  // Pulsing ring to distinguish their candle
  const ring = document.createElementNS('http://www.w3.org/2000/svg','circle');
  ring.setAttribute('class','own-candle');
  ring.setAttribute('cx', pos.x); ring.setAttribute('cy', pos.y);
  ring.setAttribute('r','12');
  ring.setAttribute('fill','none');
  ring.setAttribute('stroke','#E8B86D');
  ring.setAttribute('stroke-width','2');
  ring.setAttribute('opacity','0.8');

  const ringAnim = document.createElementNS('http://www.w3.org/2000/svg','animate');
  ringAnim.setAttribute('attributeName','r');
  ringAnim.setAttribute('values','8;18;8');
  ringAnim.setAttribute('dur','2s');
  ringAnim.setAttribute('repeatCount','indefinite');
  ring.appendChild(ringAnim);

  const ringAnim2 = document.createElementNS('http://www.w3.org/2000/svg','animate');
  ringAnim2.setAttribute('attributeName','opacity');
  ringAnim2.setAttribute('values','0.8;0;0.8');
  ringAnim2.setAttribute('dur','2s');
  ringAnim2.setAttribute('repeatCount','indefinite');
  ring.appendChild(ringAnim2);

  svg.appendChild(ring);
}

function showSuccessReturn(c) {
  const backdrop = document.createElement('div');
  backdrop.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:199;';
  backdrop.id = 'successBackdrop';
  document.body.appendChild(backdrop);

  const b = document.createElement('div');
  b.className = 'success-banner';
  b.style.cssText = 'border-color: var(--gold-light);';
  b.innerHTML = `
    <span class="success-flame">🕯</span>
    <h3>Your flame is burning</h3>
    <p>Welcome back. Your candle is now live on the map.<br>Look for the pulsing ring — that is yours.</p>
    <span class="success-code">${c.code}</span>
    <p style="font-size:11px;color:var(--text-muted);">📍 ${c.location_name || 'The World'} · Burns for 7 days</p>
    <button class="btn-success" onclick="shareCandle('${c.code}')">Share My Flame</button>
    <button class="btn-success-outline" onclick="document.getElementById('successBackdrop')?.remove();this.closest('.success-banner').remove()">View the map</button>`;
  document.body.appendChild(b);

  highlightOwnCandle(c);
}

function checkUrlCandle() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('candle');
  const isSuccess = params.get('success') === 'true';

  if (!code) return;

  // If payment just completed, poll until candle is confirmed
  if (isSuccess) {
    let attempts = 0;
    const poll = setInterval(async () => {
      attempts++;
      try {
        const fresh = await loadCandles();
        const found = fresh.find(x => x.code === code);
        if (found) {
          clearInterval(poll);
          candles = fresh;
          renderCandles(candles);
          setTimeout(() => showSuccessReturn(found), 400);
        } else if (attempts >= 12) {
          clearInterval(poll);
          showWaitingBanner(code);
        }
      } catch(e) { clearInterval(poll); }
    }, 5000);
    return;
  }

  // Arriving via "View on map" from flames.html — highlight that candle with an identity label
  const c = candles.find(x => x.code === code);
  if (c) {
    setTimeout(() => {
      highlightOwnCandle(c);
      // Show a small floating identity label above the dot
      const svg = document.getElementById('mapSvg');
      const pos = latLngToSvg(c.latitude, c.longitude);
      const label = document.createElementNS('http://www.w3.org/2000/svg','g');
      label.setAttribute('class','own-candle');

      const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
      rect.setAttribute('x', pos.x - 40);
      rect.setAttribute('y', pos.y - 36);
      rect.setAttribute('width', 80);
      rect.setAttribute('height', 22);
      rect.setAttribute('rx', 3);
      rect.setAttribute('fill','rgba(10,8,6,0.88)');
      rect.setAttribute('stroke','rgba(200,150,62,0.5)');
      rect.setAttribute('stroke-width','1');

      const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x', pos.x);
      txt.setAttribute('y', pos.y - 21);
      txt.setAttribute('text-anchor','middle');
      txt.setAttribute('font-family','DM Sans, sans-serif');
      txt.setAttribute('font-size','9');
      txt.setAttribute('font-weight','600');
      txt.setAttribute('fill','#E8B86D');
      txt.setAttribute('letter-spacing','0.08em');
      txt.textContent = `${c.code}  ${c.nickname || 'Anonymous'}`;

      label.appendChild(rect);
      label.appendChild(txt);
      svg.appendChild(label);
    }, 500);
  }

function showWaitingBanner(code) {
  const backdrop = document.createElement('div');
  backdrop.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:199;';
  document.body.appendChild(backdrop);

  const b = document.createElement('div');
  b.className = 'success-banner';
  b.innerHTML = `
    <span class="success-flame">🕯</span>
    <h3>Your flame is on its way</h3>
    <p>Payment confirmed. Your candle should appear on the map within the next minute.</p>
    <span class="success-code">${code}</span>
    <p style="font-size:11px;color:var(--text-muted);">Refresh this page in 60 seconds to see your flame.</p>
    <button class="btn-success" onclick="window.location.href='map.html?candle=${code}&success=true'">Check again</button>
    <button class="btn-success-outline" onclick="this.closest('.success-banner').remove();document.querySelectorAll('[style*=inset]').forEach(e=>e.remove())">View the map</button>`;
  document.body.appendChild(b);
}

async function init() {
  // Hard safety net — loading screen always clears within 8 seconds no matter what
  const safetyTimer = setTimeout(() => {
    document.getElementById('mapLoading').style.display = 'none';
  }, 8000);

  try { await buildMap(); } catch(e) { console.error('buildMap failed:', e); }

  try {
    candles = await loadCandles();
    renderCandles(candles);
    checkUrlCandle();
  } catch(e) { console.error(e); }

  clearTimeout(safetyTimer);
  document.getElementById('mapLoading').style.display = 'none';

  setInterval(async () => {
    try { candles = await loadCandles(); renderCandles(candles); } catch(e) {}
  }, 30000);
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

// Load D3 and TopoJSON, then init — page and loading screen are already visible
(async () => {
  try {
    await loadScript('https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js');
    await loadScript('https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js');
  } catch(e) {
    console.warn('CDN script load failed, map will render without country shapes:', e);
  }
  init();
})();
</script>
