  .map-wrap { flex: 1; position: relative; overflow: hidden; }

  .map-tooltip { position: fixed; background: rgba(10,8,6,0.9); border: 1px solid rgba(200,150,62,0.2); border-radius: 3px; padding: 4px 10px; font-size: 11px; color: var(--gold); pointer-events: none; z-index: 200; white-space: nowrap; display: none; }

  /* MOBILE OVERLAY BACKDROP */
  .popup-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 40;
    backdrop-filter: blur(2px);
  }
  .popup-backdrop.visible { display: block; }

  /* DESKTOP POPUP */
  .candle-popup {
    position: absolute;
    background: var(--smoke);
    border: 1px solid rgba(200,150,62,0.3);
    border-radius: 6px;
    padding: 20px;
    width: 300px;
    z-index: 50;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    animation: popIn 0.2s ease;
    max-height: calc(100vh - 100px);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* MOBILE BOTTOM SHEET */
  @media (max-width: 600px) {
    .candle-popup {
      position: fixed !important;
      bottom: 0 !important;
      left: 0 !important;
      right: 0 !important;
      top: auto !important;
      width: 100% !important;
      max-width: 100% !important;
      border-radius: 16px 16px 0 0 !important;
      max-height: 85vh !important;
      overflow-y: auto !important;
      -webkit-overflow-scrolling: touch !important;
      z-index: 50 !important;
      animation: slideUp 0.3s ease !important;
      padding-bottom: max(20px, env(safe-area-inset-bottom)) !important;
    }
    .candle-detail {
      position: fixed !important;
      bottom: 0 !important;
      left: 0 !important;
      right: 0 !important;
      top: auto !important;
      width: 100% !important;
      max-width: 100% !important;
      border-radius: 16px 16px 0 0 !important;
      max-height: 60vh !important;
      overflow-y: auto !important;
      z-index: 50 !important;
      animation: slideUp 0.3s ease !important;
      padding-bottom: max(20px, env(safe-area-inset-bottom)) !important;
    }
    .hint-bar { font-size: 11px; padding: 7px 16px; bottom: 12px; }
    .header-right .btn-nav:last-child { display: none; }
  }

  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* MOBILE DRAG HANDLE */
  .popup-handle {
    display: none;
    width: 40px;
    height: 4px;
    background: rgba(200,150,62,0.3);
    border-radius: 2px;
    margin: 0 auto 16px;
  }

  @media (max-width: 600px) {
    .popup-handle { display: block; }
  }

  @keyframes popIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
  .popup-close { position: absolute; top: 10px; right: 12px; background: none; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; padding: 4px 8px; min-width: 36px; min-height: 36px; display: flex; align-items: center; justify-content: center; }
  .popup-location { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }

  .candle-detail { position: absolute; background: var(--smoke); border: 1px solid rgba(200,150,62,0.3); border-radius: 6px; padding: 18px 20px; width: 240px; z-index: 50; box-shadow: 0 8px 40px rgba(0,0,0,0.6); animation: popIn 0.2s ease; }

  .detail-share { width: 100%; background: none; border: 1px solid rgba(200,150,62,0.25); color: var(--gold); font-family: 'DM Sans', sans-serif; font-size: 11px; padding: 8px; border-radius: 3px; cursor: pointer; transition: all 0.2s; }
  .detail-share:hover { background: rgba(200,150,62,0.08); }
  .success-banner { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: var(--smoke); border: 1px solid var(--gold); border-radius: 6px; padding: 20px 28px; z-index: 200; text-align: center; min-width: 300px; box-shadow: 0 4px 40px rgba(200,150,62,0.2); animation: popIn 0.3s ease; }
  .success-flame { font-size: 36px; display: block; margin-bottom: 8px; }
  .success-banner h3 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; color: var(--white); margin-bottom: 4px; }
  .success-banner p { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; line-height: 1.5; }
  .success-code { font-family: monospace; font-size: 26px; color: var(--gold); letter-spacing: 0.3em; font-weight: 700; display: block; margin: 10px 0; }
  .btn-success { background: var(--gold); border: none; color: var(--deep); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; padding: 8px 18px; border-radius: 3px; cursor: pointer; margin: 4px; }
  .btn-success-outline { background: none; border: 1px solid rgba(200,150,62,0.3); color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 8px 16px; border-radius: 3px; cursor: pointer; margin: 4px; }
  .map-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--deep); z-index: 5; flex-direction: column; gap: 12px; }
  .loading-text { font-size: 12px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; }
  .loading-flame { font-size: 40px; animation: loadPulse 1s ease-in-out infinite; }
  @keyframes loadPulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.15); opacity: 1; } }
</style>

function latLngToSvg(lat, lng) {
  return { x: ((lng + 180) / 360) * 1000, y: ((90 - lat) / 180) * 500 };
}

function svgToLatLng(clientX, clientY) {
  const svg = document.getElementById('mapSvg');
  const rect = svg.getBoundingClientRect();
  const svgX = ((clientX - rect.left) / rect.width) * 1000;
  const svgY = ((clientY - rect.top) / rect.height) * 500;
  return {
    lat: parseFloat((90 - (svgY / 500) * 180).toFixed(4)),
    lng: parseFloat(((svgX / 1000) * 360 - 180).toFixed(4))
  };
}

function approxLocation(lat, lng) {
  if (lat > 50 && lng > -10 && lng < 30) return 'Europe';
  if (lat > 55 && lng > 30) return 'Russia';
  if (lat > 24 && lat < 50 && lng > -130 && lng < -60) return 'North America';
  if (lat < 15 && lat > -60 && lng > -85 && lng < -30) return 'South America';
  if (lat < 38 && lat > -35 && lng > -20 && lng < 55) return 'Africa';
  if (lat > 15 && lat < 38 && lng > 25 && lng < 60) return 'Middle East';
  if (lat > 5 && lat < 38 && lng > 60 && lng < 85) return 'South Asia';
  if (lat > 20 && lat < 55 && lng > 85 && lng < 145) return 'East Asia';
  if (lat < 20 && lat > -10 && lng > 95 && lng < 145) return 'Southeast Asia';
  if (lat < -10 && lng > 110 && lng < 180) return 'Oceania';
  if (lat > 60) return 'Northern Regions';
  return 'The World';
}

function timeRemaining(expiresAt) {
  const diff = new Date(expiresAt) - new Date();
  if (diff <= 0) return 'Expired';
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  if (days > 0) return `${days}d ${hours}h remaining`;
  return `${hours}h remaining`;
}

function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length: 5}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}

async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation', ...options.headers },
    ...options
  });
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function loadCandles() {
  const now = new Date().toISOString();
  return sbFetch(`candles?payment_confirmed=eq.true&expires_at=gt.${encodeURIComponent(now)}&select=*&order=created_at.desc`);
}

async function insertCandle(data) {
  return sbFetch('candles', { method: 'POST', body: JSON.stringify(data) });
}

let candles = [];
let generatedCode = null;
let selectedLat = null;
let selectedLng = null;
let selectedIntent = '';

function buildMap() {
  const svg = document.getElementById('mapSvg');

  for (let lat = -80; lat <= 80; lat += 20) {
    const y = ((90 - lat) / 180) * 500;
    const l = document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',0); l.setAttribute('y1',y); l.setAttribute('x2',1000); l.setAttribute('y2',y);
    l.setAttribute('stroke','rgba(200,150,62,0.05)'); l.setAttribute('stroke-width','0.5');
    svg.appendChild(l);
  }
  for (let lng = -180; lng <= 180; lng += 30) {
    const x = ((lng + 180) / 360) * 1000;
    const l = document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x); l.setAttribute('y1',0); l.setAttribute('x2',x); l.setAttribute('y2',500);
    l.setAttribute('stroke','rgba(200,150,62,0.05)'); l.setAttribute('stroke-width','0.5');
    svg.appendChild(l);
  }

  COUNTRIES.forEach(c => {
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', c.d);
    path.setAttribute('fill','rgba(200,150,62,0.07)');
    path.setAttribute('stroke','rgba(200,150,62,0.25)');
    path.setAttribute('stroke-width','0.8');
    path.addEventListener('mouseenter', () => path.setAttribute('fill','rgba(200,150,62,0.14)'));
    path.addEventListener('mouseleave', () => path.setAttribute('fill','rgba(200,150,62,0.07)'));
    svg.appendChild(path);
  });

  svg.addEventListener('click', handleMapClick);
  svg.addEventListener('mousemove', e => {
    const { lat, lng } = svgToLatLng(e.clientX, e.clientY);
    const tt = document.getElementById('mapTooltip');
    tt.style.display = 'block';
    tt.style.left = (e.clientX + 14) + 'px';
    tt.style.top = (e.clientY - 30) + 'px';
    tt.textContent = `${approxLocation(lat, lng)} · ${lat.toFixed(1)}°, ${lng.toFixed(1)}°`;
  });
  svg.addEventListener('mouseleave', () => { document.getElementById('mapTooltip').style.display = 'none'; });
}

function handleMapClick(e) {
  if (e.target.closest('.candle-popup') || e.target.closest('.candle-detail')) return;
  closePopup();
  const { lat, lng } = svgToLatLng(e.clientX, e.clientY);
  selectedLat = lat; selectedLng = lng;
  generatedCode = generateCode();
  const nearby = candles.filter(c => Math.abs(c.latitude - lat) < 8 && Math.abs(c.longitude - lng) < 8).slice(0, 3);
  showPlacePopup(e.clientX, e.clientY, lat, lng, nearby);
}

function showPlacePopup(cx, cy, lat, lng, nearby) {

  const popup = document.createElement('div');
  popup.className = 'candle-popup'; popup.id = 'activePopup';

    nearbyHtml = `<div class="popup-nearby-title">🕯 Flames burning nearby</div>

      <button class="intent-chip" onclick="selectIntent(this,'My team')">My team</button>
    </div>
    <input class="popup-input" id="intentInput" type="text" placeholder="Or write your own..." maxlength="60" autocomplete="off">
    <button class="popup-cta" id="popupCta" onclick="proceedToPayment()">🕯 Light My Flame — £0.99</button>
    <div class="popup-price-note">Apple Pay · Card · Secure via Stripe</div>`;

  positionPopup(popup, cx, cy, wrap);
}

function viewCandle(code) {
  const c = candles.find(x => x.code === code);
  if (!c) return;
  const pos = latLngToSvg(c.latitude, c.longitude);
  const svg = document.getElementById('mapSvg');
  const rect = svg.getBoundingClientRect();
  const cx = (pos.x / 1000) * rect.width + rect.left;
  const cy = (pos.y / 500) * rect.height + rect.top;
  closePopup();
  showCandleDetail(cx, cy, c);
}

function showCandleDetail(cx, cy, c) {
  const wrap = document.querySelector('.map-wrap');
  const detail = document.createElement('div');
  detail.className = 'candle-detail'; detail.id = 'activePopup';
  detail.innerHTML = `
    <div class="popup-handle"></div>
    <button class="popup-close" onclick="closePopup()">×</button>
    <div class="detail-code">${c.code}</div>
    ${c.nickname ? `<div class="detail-nick">${c.nickname}</div>` : ''}
    ${c.intention ? `<div class="detail-intention">"${c.intention}"</div>` : ''}
    <div class="detail-location">📍 ${approxLocation(c.latitude, c.longitude)}</div>
    <div class="detail-expires">🕯 ${timeRemaining(c.expires_at)}</div>
    <button class="detail-share" onclick="shareCandle('${c.code}')">🔗 Share this flame</button>`;
  positionPopup(detail, cx, cy, wrap);
}

function isMobile() { return window.innerWidth <= 600; }

function positionPopup(popup, cx, cy, wrap) {
  wrap.appendChild(popup);
  document.getElementById('popupBackdrop').classList.add('visible');

  if (isMobile()) {
    // On mobile it is a bottom sheet - CSS handles positioning
    return;
  }

  // Desktop positioning
  const wRect = wrap.getBoundingClientRect();
  const pw = popup.offsetWidth || 300;
  const ph = popup.offsetHeight || 400;
  let left = cx - wRect.left - pw / 2;
  let top = cy - wRect.top - ph - 16;
  if (left < 8) left = 8;
  if (left + pw > wRect.width - 8) left = wRect.width - pw - 8;
  if (top < 8) top = cy - wRect.top + 20;
  if (top + ph > wRect.height - 8) top = wRect.height - ph - 8;
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
}

function closePopup() {
  const el = document.getElementById('activePopup');
  if (el) el.remove();
  document.getElementById('popupBackdrop').classList.remove('visible');
  selectedIntent = '';
}

function selectIntent(btn, val) {
  document.querySelectorAll('.intent-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedIntent = val;
  const inp = document.getElementById('intentInput');
  if (inp) inp.value = val;
}

async function proceedToPayment() {
  const btn = document.getElementById('popupCta');
  if (!btn) return;
  btn.disabled = true; btn.textContent = 'Saving...';

  const nickname = (document.getElementById('nicknameInput')?.value || '').trim();
  const intention = (document.getElementById('intentInput')?.value || selectedIntent || 'Peace').trim();

  try {
    await insertCandle({
      code: generatedCode,
      nickname: nickname || null,
      latitude: selectedLat,
      longitude: selectedLng,
      location_name: approxLocation(selectedLat, selectedLng),
      intention,
      payment_confirmed: false
    });
    window.open(`${STRIPE_LINK}?client_reference_id=${generatedCode}`, '_blank');
    closePopup();
    showSuccessBanner(generatedCode);
  } catch(err) {
    console.error(err);
    btn.disabled = false; btn.textContent = '🕯 Light My Flame — £0.99';
    alert('Something went wrong. Please try again.');
  }
}

function showSuccessBanner(code) {
  const b = document.createElement('div');
  b.className = 'success-banner';
  b.innerHTML = `
    <span class="success-flame">🕯</span>
    <h3>Your flame is placed</h3>
    <p>Complete payment in the tab that just opened.<br>Your flame appears on this map within minutes.</p>
    <span class="success-code">${code}</span>
    <p>Save this code. Share your flame with others.</p>
    <button class="btn-success" onclick="shareCandle('${code}')">Share My Flame</button>
    <button class="btn-success-outline" onclick="this.closest('.success-banner').remove()">Close</button>`;
  document.body.appendChild(b);
}

function shareCandle(code) {
  const url = `https://oneflame.earth/map.html?candle=${code}`;
  if (navigator.share) {
    navigator.share({ title: 'My One Flame', text: `I lit flame ${code} for peace.`, url });
  } else {
    navigator.clipboard.writeText(url).then(() => alert('Link copied to clipboard!'));
  }
}

function renderCandles(list) {
  const svg = document.getElementById('mapSvg');
  svg.querySelectorAll('.candle-dot').forEach(el => el.remove());
  list.forEach(c => {
    const pos = latLngToSvg(c.latitude, c.longitude);
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','candle-dot'); g.style.cursor = 'pointer';

    const glow = document.createElementNS('http://www.w3.org/2000/svg','circle');
    glow.setAttribute('cx', pos.x); glow.setAttribute('cy', pos.y); glow.setAttribute('r','7');
    glow.setAttribute('fill','rgba(200,150,62,0.25)');
    const anim = document.createElementNS('http://www.w3.org/2000/svg','animate');
    anim.setAttribute('attributeName','r'); anim.setAttribute('values','5;10;5');
    anim.setAttribute('dur', (2 + Math.random() * 2) + 's'); anim.setAttribute('repeatCount','indefinite');
    glow.appendChild(anim);

    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx', pos.x); dot.setAttribute('cy', pos.y); dot.setAttribute('r','4');
    dot.setAttribute('fill','#C8963E');

    g.appendChild(glow); g.appendChild(dot);
    g.addEventListener('click', e => { e.stopPropagation(); showCandleDetail(e.clientX, e.clientY, c); });
    g.addEventListener('mouseenter', () => { dot.setAttribute('r','6'); dot.setAttribute('fill','#E8B86D'); });
    g.addEventListener('mouseleave', () => { dot.setAttribute('r','4'); dot.setAttribute('fill','#C8963E'); });
    svg.appendChild(g);
  });
  document.getElementById('liveCount').textContent = list.length.toLocaleString();
}

function checkUrlCandle() {
  const code = new URLSearchParams(window.location.search).get('candle');
  if (!code) return;
  const c = candles.find(x => x.code === code);
  if (c) {
    const pos = latLngToSvg(c.latitude, c.longitude);
    const svg = document.getElementById('mapSvg');
    const rect = svg.getBoundingClientRect();
    const cx = (pos.x / 1000) * rect.width + rect.left;
    const cy = (pos.y / 500) * rect.height + rect.top;
    setTimeout(() => showCandleDetail(cx, cy, c), 600);
  }
}

async function init() {
  buildMap();
  try {
    candles = await loadCandles();
    renderCandles(candles);
    checkUrlCandle();
  } catch(e) { console.error(e); }
  document.getElementById('mapLoading').style.display = 'none';
  setInterval(async () => {
    try { candles = await loadCandles(); renderCandles(candles); } catch(e) {}
  }, 30000);
}

window.addEventListener('load', init);
</script>
</body>
