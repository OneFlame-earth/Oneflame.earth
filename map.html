  .btn-nav:hover { color: var(--gold); border-color: var(--gold); }
  .map-wrap { flex: 1; position: relative; overflow: hidden; }
  #mapSvg { width: 100%; height: 100%; cursor: crosshair; display: block; }
  .hint-bar { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); background: rgba(10,8,6,0.85); border: 1px solid rgba(200,150,62,0.2); border-radius: 20px; padding: 8px 20px; font-size: 12px; color: var(--text-muted); letter-spacing: 0.05em; pointer-events: none; white-space: nowrap; backdrop-filter: blur(8px); }
  .map-tooltip { position: fixed; background: rgba(10,8,6,0.9); border: 1px solid rgba(200,150,62,0.2); border-radius: 3px; padding: 4px 10px; font-size: 11px; color: var(--gold); pointer-events: none; z-index: 200; white-space: nowrap; display: none; }

    z-index: 40;

    max-height: calc(100vh - 100px);

    -webkit-overflow-scrolling: touch;
  }

  /* MOBILE BOTTOM SHEET */
  @media (max-width: 600px) {
    .candle-popup {
      position: fixed !important;
      bottom: 0 !important;
      left: 0 !important;
      right: 0 !important;
      top: auto !important;

  @keyframes popIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }

  .popup-price-note { font-size: 10px; color: var(--text-muted); text-align: center; margin-top: 7px; }
  .candle-detail { position: absolute; background: var(--smoke); border: 1px solid rgba(200,150,62,0.3); border-radius: 6px; padding: 18px 20px; width: 240px; z-index: 50; box-shadow: 0 8px 40px rgba(0,0,0,0.6); animation: popIn 0.2s ease; }
  .detail-code { font-family: monospace; font-size: 22px; color: var(--gold); letter-spacing: 0.25em; font-weight: 700; margin-bottom: 4px; }
  .detail-nick { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--white); margin-bottom: 6px; }
  .detail-intention { font-size: 13px; color: var(--text-muted); font-style: italic; margin-bottom: 10px; line-height: 1.4; }
  .detail-location { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }

  .detail-share { width: 100%; background: none; border: 1px solid rgba(200,150,62,0.25); color: var(--gold); font-family: 'DM Sans', sans-serif; font-size: 11px; padding: 8px; border-radius: 3px; cursor: pointer; transition: all 0.2s; }
  .detail-share:hover { background: rgba(200,150,62,0.08); }
  .success-banner { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: var(--smoke); border: 1px solid var(--gold); border-radius: 6px; padding: 20px 28px; z-index: 200; text-align: center; width: 90%; max-width: 360px; box-shadow: 0 4px 40px rgba(200,150,62,0.2); animation: popIn 0.3s ease; }

  .btn-success { background: var(--gold); border: none; color: var(--deep); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; padding: 8px 18px; border-radius: 3px; cursor: pointer; margin: 4px; }
  .btn-success-outline { background: none; border: 1px solid rgba(200,150,62,0.3); color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 8px 16px; border-radius: 3px; cursor: pointer; margin: 4px; }
  .map-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--deep); z-index: 5; flex-direction: column; gap: 12px; }
  .loading-text { font-size: 12px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; }
  .loading-flame { font-size: 40px; animation: loadPulse 1s ease-in-out infinite; }
  @keyframes loadPulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.15); opacity: 1; } }

<script>
const SUPABASE_URL = 'https://rytjvdptbjnlhayclcvu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5dGp2ZHB0YmpubGhheWNsY3Z1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzA1MjksImV4cCI6MjA5MDkwNjUyOX0.y6qVpN-tJKafDVY_yUk0K6yQ9xXYy5xfIhFoJvqWf48';
const STRIPE_LINK = 'https://buy.stripe.com/7sY6oIgzr7zaavDaE1eME00';

// D3 handles the real world map - loaded via CDN in HTML head

function latLngToSvg(lat, lng) {
  return { x: ((lng + 180) / 360) * 1000, y: ((90 - lat) / 180) * 500 };
}

function svgToLatLng(clientX, clientY) {
  const svg = document.getElementById('mapSvg');
  const rect = svg.getBoundingClientRect();
  const svgX = ((clientX - rect.left) / rect.width) * 1000;
  const svgY = ((clientY - rect.top) / rect.height) * 500;
  return {
    lat: parseFloat((90 - (svgY / 500) * 180).toFixed(4)),
    lng: parseFloat(((svgX / 1000) * 360 - 180).toFixed(4))
  };
}

function approxLocation(lat, lng) {
  // UK and Ireland
  if (lat > 49 && lat < 61 && lng > -11 && lng < 2) return 'United Kingdom';
  // Scandinavia
  if (lat > 54 && lat < 72 && lng > 4 && lng < 32) return 'Scandinavia';
  // Western Europe
  if (lat > 35 && lat < 55 && lng > -10 && lng < 20) return 'Western Europe';
  // Eastern Europe
  if (lat > 40 && lat < 55 && lng > 20 && lng < 40) return 'Eastern Europe';
  // Russia
  if (lat > 50 && lng > 30 && lng < 180) return 'Russia';
  // Turkey
  if (lat > 36 && lat < 42 && lng > 26 && lng < 45) return 'Turkey';
  // Greenland
  if (lat > 60 && lng > -60 && lng < -15) return 'Greenland';
  // Canada
  if (lat > 48 && lat < 70 && lng > -140 && lng < -52) return 'Canada';
  // USA
  if (lat > 24 && lat < 50 && lng > -125 && lng < -65) return 'United States';
  // Mexico
  if (lat > 14 && lat < 30 && lng > -118 && lng < -86) return 'Mexico';
  // Central America and Caribbean
  if (lat > 7 && lat < 24 && lng > -92 && lng < -60) return 'Central America';
  // Colombia Venezuela
  if (lat > 0 && lat < 15 && lng > -80 && lng < -58) return 'Northern South America';
  // Brazil
  if (lat > -35 && lat < 5 && lng > -75 && lng < -34) return 'Brazil';
  // Southern South America
  if (lat > -56 && lat < -15 && lng > -82 && lng < -52) return 'Southern South America';
  // North Africa
  if (lat > 15 && lat < 38 && lng > -18 && lng < 40) return 'North Africa';
  // West Africa
  if (lat > -5 && lat < 18 && lng > -18 && lng < 15) return 'West Africa';
  // East Africa
  if (lat > -12 && lat < 18 && lng > 28 && lng < 52) return 'East Africa';
  // Southern Africa
  if (lat > -35 && lat < -12 && lng > 12 && lng < 42) return 'Southern Africa';
  // Middle East
  if (lat > 12 && lat < 38 && lng > 34 && lng < 62) return 'Middle East';
  // Iran
  if (lat > 25 && lat < 40 && lng > 44 && lng < 64) return 'Iran';
  // Central Asia
  if (lat > 35 && lat < 55 && lng > 50 && lng < 88) return 'Central Asia';
  // India
  if (lat > 8 && lat < 35 && lng > 68 && lng < 90) return 'India';
  // China
  if (lat > 18 && lat < 55 && lng > 73 && lng < 135) return 'China';
  // Japan
  if (lat > 30 && lat < 46 && lng > 128 && lng < 148) return 'Japan';
  // South Korea
  if (lat > 33 && lat < 39 && lng > 124 && lng < 132) return 'South Korea';
  // Southeast Asia
  if (lat > -10 && lat < 28 && lng > 92 && lng < 142) return 'Southeast Asia';
  // Australia
  if (lat > -44 && lat < -10 && lng > 113 && lng < 154) return 'Australia';
  // New Zealand
  if (lat > -47 && lat < -34 && lng > 166 && lng < 178) return 'New Zealand';
  // Pacific Islands
  if (lat > -30 && lat < 30 && lng > 140) return 'Pacific';
  // Arctic
  if (lat > 70) return 'Arctic Region';
  // Antarctic
  if (lat < -60) return 'Antarctic Region';
  return 'The Ocean';
}

function timeRemaining(expiresAt) {
  const diff = new Date(expiresAt) - new Date();
  if (diff <= 0) return 'Expired';
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  if (days > 0) return `${days}d ${hours}h remaining`;
  return `${hours}h remaining`;
}

function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length: 5}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}

async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', ...options.headers },
    ...options
  });
  const text = await res.text();
  if (!res.ok) throw new Error(`Supabase ${res.status}: ${text}`);
  return text ? JSON.parse(text) : [];
}

async function loadCandles() {
  const now = new Date().toISOString();
  return sbFetch(`candles?payment_confirmed=eq.true&expires_at=gt.${encodeURIComponent(now)}&select=*&order=created_at.desc`);
}

async function insertCandle(data) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/candles`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(data)
  });
  if (!res.ok) {
    const errText = await res.text();
    console.error('Insert failed:', res.status, errText);
    throw new Error(`Insert failed: ${res.status} ${errText}`);
  }
  return true;
}

let candles = [];
let generatedCode = null;
let selectedLat = null;
let selectedLng = null;
let selectedIntent = '';

async function buildMap() {
  const svg = document.getElementById('mapSvg');
  const W = 1000, H = 500;

  // Draw graticule grid lines first
  for (let lat = -80; lat <= 80; lat += 20) {
    const y = ((90 - lat) / H) * H;
    const l = document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',0); l.setAttribute('y1', ((90-lat)/180)*500);
    l.setAttribute('x2',1000); l.setAttribute('y2', ((90-lat)/180)*500);
    l.setAttribute('stroke','rgba(200,150,62,0.05)'); l.setAttribute('stroke-width','0.5');
    svg.appendChild(l);
  }
  for (let lng = -180; lng <= 180; lng += 30) {
    const x = ((lng + 180) / 360) * 1000;
    const l = document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x); l.setAttribute('y1',0);
    l.setAttribute('x2',x); l.setAttribute('y2',500);
    l.setAttribute('stroke','rgba(200,150,62,0.05)'); l.setAttribute('stroke-width','0.5');
    svg.appendChild(l);
  }

  // Load Natural Earth world map data from CDN
  try {
    const [topoResponse] = await Promise.all([
      fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    ]);
    const world = await topoResponse.json();

    // Use topojson to get country features
    const countries = topojson.feature(world, world.objects.countries);
    const projection = d3.geoEquirectangular()
      .scale(159.15)
      .translate([500, 250]);
    const path = d3.geoPath().projection(projection);

    // Create a group for all countries
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('id', 'countriesGroup');

    countries.features.forEach(feature => {
      const p = document.createElementNS('http://www.w3.org/2000/svg','path');
      const d = path(feature);
      if (!d) return;
      p.setAttribute('d', d);
      p.setAttribute('fill','rgba(200,150,62,0.08)');
      p.setAttribute('stroke','rgba(200,150,62,0.28)');
      p.setAttribute('stroke-width','0.6');
      p.setAttribute('stroke-linejoin','round');
      p.style.transition = 'fill 0.2s';
      p.addEventListener('mouseenter', () => p.setAttribute('fill','rgba(200,150,62,0.18)'));
      p.addEventListener('mouseleave', () => p.setAttribute('fill','rgba(200,150,62,0.08)'));
      g.appendChild(p);
    });

    svg.appendChild(g);
  } catch(e) {
    console.error('Map load error:', e);
    // Fallback - ocean background only
  }

  svg.addEventListener('click', handleMapClick);
  svg.addEventListener('mousemove', e => {
    const { lat, lng } = svgToLatLng(e.clientX, e.clientY);
    const tt = document.getElementById('mapTooltip');
    tt.style.display = 'block';
    tt.style.left = (e.clientX + 14) + 'px';
    tt.style.top = (e.clientY - 30) + 'px';
    tt.textContent = `${approxLocation(lat, lng)} · ${lat.toFixed(1)}°, ${lng.toFixed(1)}°`;
  });
  svg.addEventListener('mouseleave', () => { document.getElementById('mapTooltip').style.display = 'none'; });
}

function handleMapClick(e) {
  if (e.target.closest('.candle-popup') || e.target.closest('.candle-detail')) return;
  closePopup();
  const { lat, lng } = svgToLatLng(e.clientX, e.clientY);
  selectedLat = lat; selectedLng = lng;
  generatedCode = generateCode();
  const nearby = candles.filter(c => Math.abs(c.latitude - lat) < 8 && Math.abs(c.longitude - lng) < 8).slice(0, 3);
  showPlacePopup(e.clientX, e.clientY, lat, lng, nearby);
}

function showPlacePopup(cx, cy, lat, lng, nearby) {
  const wrap = document.querySelector('.map-wrap');
  const popup = document.createElement('div');
  popup.className = 'candle-popup'; popup.id = 'activePopup';
  const loc = approxLocation(lat, lng);

  let nearbyHtml = '';
  if (nearby.length) {
    nearbyHtml = `<div class="popup-nearby-title">🕯 Flames burning nearby</div>
    ${nearby.map(c => `<div class="nearby-candle" onclick="viewCandle('${c.code}')">
      <div style="flex:1"><div class="nearby-code">${c.code}</div><div class="nearby-nick">${c.nickname || 'Anonymous'}</div></div>
      <div class="nearby-time">${timeRemaining(c.expires_at)}</div>
    </div>`).join('')}
    <hr class="popup-divider">`;
  }

  popup.innerHTML = `
    <div class="popup-handle"></div>
    <button class="popup-close" onclick="closePopup()">×</button>
    <div class="popup-location">📍 ${loc}</div>
    <div class="popup-title">Place your flame here</div>
    ${nearbyHtml}
    <span class="popup-label">Your flame code</span>
    <div class="popup-code-display" id="popupCode">${generatedCode}</div>
    <span class="popup-label">Nickname (optional)</span>
    <input class="popup-input" id="nicknameInput" type="text" placeholder="e.g. Maria from Rome..." maxlength="30" autocomplete="off">
    <span class="popup-label">Your intention</span>
    <div class="intent-chips">
      <button class="intent-chip" onclick="selectIntent(this,'Peace')">Peace</button>
      <button class="intent-chip" onclick="selectIntent(this,'Hope')">Hope</button>
      <button class="intent-chip" onclick="selectIntent(this,'Love')">Love</button>
      <button class="intent-chip" onclick="selectIntent(this,'For the children')">For the children</button>
      <button class="intent-chip" onclick="selectIntent(this,'My team')">My team</button>
    </div>
    <input class="popup-input" id="intentInput" type="text" placeholder="Or write your own..." maxlength="60" autocomplete="off">
    <button class="popup-cta" id="popupCta" onclick="proceedToPayment()">🕯 Light My Flame — £0.99</button>
    <div class="popup-price-note">Apple Pay · Card · Secure via Stripe</div>`;

  positionPopup(popup, cx, cy, wrap);
}

function viewCandle(code) {
  const c = candles.find(x => x.code === code);
  if (!c) return;
  const pos = latLngToSvg(c.latitude, c.longitude);
  const svg = document.getElementById('mapSvg');
  const rect = svg.getBoundingClientRect();
  const cx = (pos.x / 1000) * rect.width + rect.left;
  const cy = (pos.y / 500) * rect.height + rect.top;
  closePopup();
  showCandleDetail(cx, cy, c);
}

function showCandleDetail(cx, cy, c) {
  const wrap = document.querySelector('.map-wrap');
  const detail = document.createElement('div');
  detail.className = 'candle-detail'; detail.id = 'activePopup';
  detail.innerHTML = `
    <div class="popup-handle"></div>
    <button class="popup-close" onclick="closePopup()">×</button>
    <div class="detail-code">${c.code}</div>
    ${c.nickname ? `<div class="detail-nick">${c.nickname}</div>` : ''}
    ${c.intention ? `<div class="detail-intention">"${c.intention}"</div>` : ''}
    <div class="detail-location">📍 ${approxLocation(c.latitude, c.longitude)}</div>
    <div class="detail-expires">🕯 ${timeRemaining(c.expires_at)}</div>
    <button class="detail-share" onclick="shareCandle('${c.code}')">🔗 Share this flame</button>`;
  positionPopup(detail, cx, cy, wrap);
}

function isMobile() { return window.innerWidth <= 600; }

function positionPopup(popup, cx, cy, wrap) {
  wrap.appendChild(popup);
  document.getElementById('popupBackdrop').classList.add('visible');

  if (isMobile()) {
    // On mobile it is a bottom sheet - CSS handles positioning
    return;
  }

  // Desktop positioning
  const wRect = wrap.getBoundingClientRect();
  const pw = popup.offsetWidth || 300;
  const ph = popup.offsetHeight || 400;
  let left = cx - wRect.left - pw / 2;
  let top = cy - wRect.top - ph - 16;
  if (left < 8) left = 8;
  if (left + pw > wRect.width - 8) left = wRect.width - pw - 8;
  if (top < 8) top = cy - wRect.top + 20;
  if (top + ph > wRect.height - 8) top = wRect.height - ph - 8;
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
}

function closePopup() {
  const el = document.getElementById('activePopup');
  if (el) el.remove();
  document.getElementById('popupBackdrop').classList.remove('visible');
  selectedIntent = '';
}

function selectIntent(btn, val) {
  document.querySelectorAll('.intent-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedIntent = val;
  const inp = document.getElementById('intentInput');
  if (inp) inp.value = val;
}

async function proceedToPayment() {
  const btn = document.getElementById('popupCta');
  if (!btn) return;
  btn.disabled = true; btn.textContent = 'Saving...';

  const nickname = (document.getElementById('nicknameInput')?.value || '').trim();
  const intention = (document.getElementById('intentInput')?.value || selectedIntent || 'Peace').trim();

  try {
    await insertCandle({
      code: generatedCode,
      nickname: nickname || null,
      latitude: selectedLat,
      longitude: selectedLng,
      location_name: approxLocation(selectedLat, selectedLng),
      intention,
      payment_confirmed: false
    });
    window.open(`${STRIPE_LINK}?client_reference_id=${generatedCode}`, '_blank');
    closePopup();
    showSuccessBanner(generatedCode);
  } catch(err) {
    console.error('Payment flow error:', err);
    btn.disabled = false;
    btn.textContent = '🕯 Light My Flame — £0.99';
    alert('Could not save your candle. Error: ' + err.message + '\n\nPlease screenshot this and report it.');
  }
}

function showSuccessBanner(code) {
  const b = document.createElement('div');
  b.className = 'success-banner';
  b.innerHTML = `
    <span class="success-flame">🕯</span>
    <h3>Your flame is placed</h3>
    <p>Complete payment in the tab that just opened.<br>Your flame appears on this map within minutes.</p>
    <span class="success-code">${code}</span>
    <p>Save this code. Share your flame with others.</p>
    <button class="btn-success" onclick="shareCandle('${code}')">Share My Flame</button>
    <button class="btn-success-outline" onclick="this.closest('.success-banner').remove()">Close</button>`;
  document.body.appendChild(b);
}

function shareCandle(code) {
  const url = `https://oneflame.earth/map.html?candle=${code}`;
  if (navigator.share) {
    navigator.share({ title: 'My One Flame', text: `I lit flame ${code} for peace.`, url });
  } else {
    navigator.clipboard.writeText(url).then(() => alert('Link copied to clipboard!'));
  }
}

function renderCandles(list) {
  const svg = document.getElementById('mapSvg');
  svg.querySelectorAll('.candle-dot').forEach(el => el.remove());
  list.forEach(c => {
    const pos = latLngToSvg(c.latitude, c.longitude);
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','candle-dot'); g.style.cursor = 'pointer';

    const glow = document.createElementNS('http://www.w3.org/2000/svg','circle');
    glow.setAttribute('cx', pos.x); glow.setAttribute('cy', pos.y); glow.setAttribute('r','7');
    glow.setAttribute('fill','rgba(200,150,62,0.25)');
    const anim = document.createElementNS('http://www.w3.org/2000/svg','animate');
    anim.setAttribute('attributeName','r'); anim.setAttribute('values','5;10;5');
    anim.setAttribute('dur', (2 + Math.random() * 2) + 's'); anim.setAttribute('repeatCount','indefinite');
    glow.appendChild(anim);

    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx', pos.x); dot.setAttribute('cy', pos.y); dot.setAttribute('r','4');
    dot.setAttribute('fill','#C8963E');

    g.appendChild(glow); g.appendChild(dot);
    g.addEventListener('click', e => { e.stopPropagation(); showCandleDetail(e.clientX, e.clientY, c); });
    g.addEventListener('mouseenter', () => { dot.setAttribute('r','6'); dot.setAttribute('fill','#E8B86D'); });
    g.addEventListener('mouseleave', () => { dot.setAttribute('r','4'); dot.setAttribute('fill','#C8963E'); });
    svg.appendChild(g);
  });
  document.getElementById('liveCount').textContent = list.length.toLocaleString();
}

function checkUrlCandle() {
  const code = new URLSearchParams(window.location.search).get('candle');
  if (!code) return;
  const c = candles.find(x => x.code === code);
  if (c) {
    const pos = latLngToSvg(c.latitude, c.longitude);
    const svg = document.getElementById('mapSvg');
    const rect = svg.getBoundingClientRect();
    const cx = (pos.x / 1000) * rect.width + rect.left;
    const cy = (pos.y / 500) * rect.height + rect.top;
    setTimeout(() => showCandleDetail(cx, cy, c), 600);
  }
}

async function init() {
  await buildMap();
  try {
    candles = await loadCandles();
    renderCandles(candles);
    checkUrlCandle();
  } catch(e) { console.error(e); }
  document.getElementById('mapLoading').style.display = 'none';
  setInterval(async () => {
    try { candles = await loadCandles(); renderCandles(candles); } catch(e) {}
  }, 30000);
}

window.addEventListener('load', init);
</script>
</body>
</html>
